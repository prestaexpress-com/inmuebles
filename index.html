<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Propiedades - Presta Express</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .form-card { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; }
        .header-section { background-color: #f39200; color: white; border-radius: 15px 15px 0 0; padding: 25px; }
        .section-title { color: #f39200; border-bottom: 2px solid #f39200; margin-bottom: 20px; padding-bottom: 5px; font-weight: bold; }
        .btn-send { background-color: #f39200; color: white; border: none; padding: 15px; font-weight: bold; font-size: 1.1rem; }
        .btn-send:hover { background-color: #d88200; color: white; }
    </style>
</head>
<body class="py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card form-card">
                <div class="header-section text-center">
                    <h2 class="mb-0">🏠 REGISTROaaaaaaaaaaaaaaaaa DE PROPIEDADES</h2>
                    <p class="mb-0">Presta Express - IT Management</p>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <form id="propertyForm">
                        
                        <div class="section-title text-uppercase small">🆔 Identificación</div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Código de Propiedad</label>
                                <input type="text" id="codigo" class="form-control" placeholder="_IAC-2026-ALTA-09" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Nombre del Cliente</label>
                                <input type="text" id="cliente" class="form-control" placeholder="JUAN CARLOS BÓ MAQUIN" required>
                            </div>
                        </div>

                        <div class="section-title text-uppercase small">📍 Información General</div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Ubicación Completa</label>
                            <input type="text" id="ubicacion" class="form-control" placeholder="Aldea Chiyaxut, San Pedro Carcha" required>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Precio de Venta (Q)</label>
                                <input type="number" id="precio" class="form-control" placeholder="75000" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Área (m2)</label>
                                <input type="text" id="area" class="form-control" placeholder="1,323.00 m2">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Tipo de Propiedad</label>
                                <select id="tipo" class="form-select">
                                    <option value="Terreno">Terreno</option>
                                    <option value="Casa">Casa</option>
                                    <option value="Apartamento">Apartamento</option>
                                    <option value="Otro">Otro</option>
                                </select>
                            </div>
                        </div>

                        <div class="section-title text-uppercase small">⚙️ Características y Servicios</div>
                        <div class="row mb-4">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold d-block">Servicios Disponibles:</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input srv" type="checkbox" value="Agua"> <label class="form-check-label">Agua</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input srv" type="checkbox" value="Luz"> <label class="form-check-label">Luz</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input srv" type="checkbox" value="Drenaje"> <label class="form-check-label">Drenaje</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input srv" type="checkbox" value="Garita"> <label class="form-check-label">Garita</label>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Observaciones / Puntos de Referencia</label>
                            <textarea id="obs" class="form-control" rows="4" placeholder="Ej: Cerca de Mercado Comunal..."></textarea>
                        </div>

                        <div id="statusMsg"></div>

                        <button type="submit" id="btnSubmit" class="btn btn-send w-100 text-uppercase">
                            🚀 Crear Ticket en Odoo
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN DE TU ODOO ---
    const CONFIG = {
        url: 'https://www.prestaexpress.com.gt',
        db: 'prestaexpress.xetechs.net',
        apiKey: '6c15e0feb080ef8fd60073839078ff568a9e5280', // Tu Clave "Inmuebles"
        teamId: 1, // Tu Ticketera de Soporte
        proxy: 'https://cors-anywhere.herokuapp.com/'
    };

    document.getElementById('propertyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        const status = document.getElementById('statusMsg');
        
        btn.disabled = true;
        status.innerHTML = '<div class="alert alert-info">Enviando a Odoo...</div>';

        // Recolectar servicios seleccionados
        const servicios = Array.from(document.querySelectorAll('.srv:checked')).map(cb => cb.value).join(', ');

        // Construir la descripción basada en tu plantilla de Word
        const descripcionTicket = `
            NUEVO REGISTRO DE PROPIEDAD
            ===========================
            IDENTIFICACIÓN:
            - Código: ${document.getElementById('codigo').value}
            - Cliente: ${document.getElementById('cliente').value}

            DETALLES:
            - Tipo: ${document.getElementById('tipo').value}
            - Ubicación: ${document.getElementById('ubicacion').value}
            - Área: ${document.getElementById('area').value}
            - Precio: Q ${document.getElementById('precio').value}

            SERVICIOS:
            - ${servicios || 'Ninguno especificado'}

            OBSERVACIONES:
            ${document.getElementById('obs').value}
        `;

        const payload = {
            jsonrpc: "2.0",
            method: "call",
            params: {
                service: "object",
                method: "execute_kw",
                args: [
                    CONFIG.db, 2, CONFIG.apiKey,
                    "helpdesk.ticket", "create",
                    [{
                        name: `REGISTRO: ${document.getElementById('codigo').value} - ${document.getElementById('cliente').value}`,
                        team_id: CONFIG.teamId,
                        description: descripcionTicket,
                        partner_name: document.getElementById('cliente').value
                    }]
                ]
            }
        };

        try {
            const response = await fetch(CONFIG.proxy + CONFIG.url + '/jsonrpc', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (result.result) {
                status.innerHTML = '<div class="alert alert-success">✅ ¡Excelente! Ticket creado en tu Odoo de Presta Express.</div>';
                e.target.reset();
            } else {
                status.innerHTML = '<div class="alert alert-danger">❌ Error de Odoo: ' + result.error.data.message + '</div>';
            }
        } catch (err) {
            status.innerHTML = `
                <div class="alert alert-warning">
                    ⚠️ <b>Acceso necesario:</b> Para que GitHub pueda hablar con Odoo, debes activar el permiso temporal:
                    <br><br>
                    <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank" class="btn btn-sm btn-dark">Haz clic aquí para activar</a>
                    <br><br>
                    Luego de darle al botón "Request access", regresa aquí y presiona Enviar de nuevo.
                </div>`;
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
