<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Propiedades - Presta Express</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 50px 0; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-orange { background-color: #f39200; color: white; font-weight: bold; width: 100%; padding: 10px; border: none; }
        .btn-orange:hover { background-color: #d88200; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4" style="color: #f39200;">Registro de Inmuebles</h2>
    
    <form action="https://www.prestaexpress.com.gt/website/form/" method="post" enctype="multipart/form-data">
        
        <input type="hidden" name="model_name" value="helpdesk.ticket">
        <input type="hidden" name="success_page" value="/contactus-thank-you">
        <input type="hidden" name="team_id" value="1"> <div class="mb-3">
            <label class="form-label">Asunto (Código de Propiedad)</label>
            <input type="text" name="name" class="form-control" placeholder="Ej: _IAC-2026-ALTA-09" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Nombre del Cliente</label>
            <input type="text" name="partner_name" class="form-control" placeholder="Juan Carlos Bó Maquin" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" name="partner_email" class="form-control" placeholder="cliente@correo.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Descripción / Ubicación / Precio</label>
            <textarea name="description" class="form-control" rows="5" placeholder="Indique la ubicación, área física y precio de venta..."></textarea>
        </div>

        <button type="submit" class="btn btn-orange">CREAR TICKET EN ODOO</button>
    </form>
</div>

</body>
</html>
