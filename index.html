<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Propiedades - Presta Express</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .header-bg { background-color: #f39200; color: white; border-radius: 12px 12px 0 0; padding: 20px; }
        .btn-submit { background-color: #f39200; color: white; font-weight: bold; padding: 12px; border: none; }
        .btn-submit:hover { background-color: #d88200; color: white; }
    </style>
</head>
<body class="py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card">
                <div class="header-bg text-center">
                    <h3 class="mb-0">🏡 Registro de Inmuebles</h3>
                    <small>Presta Express - 2026</small>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form id="propertyForm">
                        <h5 class="text-muted mb-3 border-bottom pb-2">🆔 Identificación</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Código Propiedad</label>
                                <input type="text" id="codigo" class="form-control" placeholder="_IAC-2026-ALTA-09" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nombre Cliente</label>
                                <input type="text" id="cliente" class="form-control" placeholder="JUAN CARLOS BÓ MAQUIN" required>
                            </div>
                        </div>

                        <h5 class="text-muted mb-3 border-bottom pb-2">📍 Ubicación y Costo</h5>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Ubicación Completa</label>
                            <input type="text" id="ubicacion" class="form-control" required>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Precio (Q)</label>
                                <input type="number" id="precio" class="form-control" placeholder="75000" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Área (m2)</label>
                                <input type="text" id="area" class="form-control" placeholder="1,323.00 m2">
                            </div>
                        </div>

                        <h5 class="text-muted mb-3 border-bottom pb-2">📝 Otros Detalles</h5>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Observaciones</label>
                            <textarea id="obs" class="form-control" rows="3" placeholder="Terreno plano, servicios disponibles..."></textarea>
                        </div>

                        <div id="responseMessage"></div>
                        <button type="submit" id="submitBtn" class="btn btn-submit w-100 mt-2 text-uppercase">Crear Ticket en Odoo</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- DATOS DE CONEXIÓN PRESTA EXPRESS ---
    const CONFIG = {
        url: 'https://www.prestaexpress.com.gt',
        db: 'prestaexpress.xetechs.net',
        apiKey: '6c15e0feb080ef8fd60073839078ff568a9e5280', // Tu clave
        teamId: 1 // Tu ID de ticketera
    };

    document.getElementById('propertyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('responseMessage');
        
        btn.disabled = true;
        msg.innerHTML = '<div class="alert alert-warning">Sincronizando con Odoo...</div>';

        const desc = `
            NUEVO REGISTRO DE INMUEBLE
            ----------------------------
            Código: ${document.getElementById('codigo').value}
            Cliente: ${document.getElementById('cliente').value}
            Ubicación: ${document.getElementById('ubicacion').value}
            Precio: Q ${document.getElementById('precio').value}
            Área: ${document.getElementById('area').value}
            Observaciones: ${document.getElementById('obs').value}
        `;

        // Estructura JSON-RPC para Odoo 
        const payload = {
            jsonrpc: "2.0",
            method: "call",
            params: {
                service: "object",
                method: "execute_kw",
                args: [
                    CONFIG.db,
                    2, // ID de usuario admin
                    CONFIG.apiKey,
                    "helpdesk.ticket",
                    "create",
                    [{
                        name: `Inmueble: ${document.getElementById('codigo').value}`,
                        team_id: CONFIG.teamId,
                        description: desc,
                        partner_name: document.getElementById('cliente').value
                    }]
                ]
            }
        };

        try {
            const response = await fetch(`${CONFIG.url}/jsonrpc`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (data.result) {
                msg.innerHTML = '<div class="alert alert-success">✅ Registro exitoso. El ticket ha sido creado en Odoo.</div>';
                e.target.reset();
            } else {
                msg.innerHTML = '<div class="alert alert-danger">❌ Error de Odoo: ' + (data.error.data.message || 'Error desconocido') + '</div>';
            }
        } catch (err) {
            msg.innerHTML = '<div class="alert alert-danger">⚠️ Error de conexión: Revisa el CORS en tu servidor Odoo.</div>';
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
